name: static checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  terraformVersions:
    name: get min/max Terraform versions
    runs-on: ubuntu-latest
    outputs:
      minVersion: ${{ steps.minMax.outputs.minVersion }}
      maxVersion: ${{ steps.minMax.outputs.maxVersion }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Terraform version
        uses: clowdhaus/terraform-min-max@5e40f8cf535d84fbd031571abd363ffd81dbfbfc #v3.0.1
        id: minMax
        with:
          directory: .

  pre_commit:
    name: pre-commit
    needs: terraformVersions
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version:
          - ${{ needs.terraformVersions.outputs.minVersion }}
          - ${{ needs.terraformVersions.outputs.maxVersion }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: pre-commit ${{ matrix.version }}
        uses: clowdhaus/terraform-composite-actions/pre-commit@462243b714d762cbcac6732098e9fdb4ab236cb7 #v1.14.0
        with:
          terraform-version: ${{ matrix.version }}
          args: '--all-files --color always --show-diff-on-failure --verbose'
        env:
          SKIP: wizcli-scan
